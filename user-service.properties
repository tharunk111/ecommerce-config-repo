spring.application.name=user-service

server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/my_app_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=user_service
spring.jpa.show-sql=true

app.jwt.private-key-location=classpath:certs/private.pem
app.jwt.public-key-location=classpath:certs/public.pem
app.jwt.issuer=user-service
app.jwt.access-token-ttl=15m
app.jwt.refresh-token-ttl=30d

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

